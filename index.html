<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Welcome to Abhiraj's Terminal</title>
    <meta name="title" content="Abhiraj's Terminal" />
    <meta
      name="description"
      content="Abhiraj's terminal website was made with ReactJS. Abhiraj is a full-stack developer based in Chennai, India."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://terminal.abhiraj.dev/" />
    <meta property="og:title" content="Abhiraj's Terminal" />
    <meta
      property="og:image"
      content="https://i.ibb.co/ZRKkrvPn/og-image.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://terminal.abhiraj.dev/" />
    <meta property="twitter:title" content="Abhiraj's Terminal" />
    <meta
      property="twitter:image"
      content="https://i.ibb.co/ZRKkrvPn/og-image.png"
    />

    <!-- Favicons and assets -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
